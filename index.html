        /* Efek kode berjalan */

        }

            text-align: center;

        .logo-img {

        @keyframes floatText {

            color: #f5e6d3;

        }
        .btn-coming:hover {

        /* footer note */

        /* Music control button - floating subtle */
        .music-control {

        /* Notifikasi kecil untuk autoplay */

        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0);}

        }

        @media (max-width: 500px) {

<!-- Tombol kontrol musik (floating) -->

    <i class="fas fa-music" id="musicIcon"></i>

<!-- Audio element: memutar file semz.mp3 (pastikan file tersedia di direktori yang sama) -->
<audio id="bgMusic" loop preload="auto" style="display: none;"></audio>

<script>
    (function() {
        // Gunakan file semz.mp3 (pastikan file ini ada di folder yang sama dengan file HTML)
        // Jika ingin menggunakan URL eksternal ganti link dibawah, tapi sesuai permintaan "semz.mp3"
        const musicUrl = "semz.mp3";
        const audio = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggleBtn');
        const musicIcon = document.getElementById('musicIcon');
        
        // Konfigurasi audio
        audio.src = musicUrl;
        audio.loop = true;
        audio.volume = 0.5;  // volume nyaman
        
        let isPlaying = false;
        let autoplaySuccess = false;
        let interactionListenerActive = false;
        
        // Fungsi untuk menampilkan notifikasi kecil (toast)
        function showToast(message, isError = false) {
            // Hapus toast yang lama jika ada
            const oldToast = document.querySelector('.autoplay-toast');
            if(oldToast) oldToast.remove();
            
            let toast = document.createElement('div');
            toast.className = 'autoplay-toast';
            if(isError) {
                toast.style.background = "#ffae42dd";
                toast.style.color = "#1e2a1a";
            } else {
                toast.style.background = "#2ecc71dd";
                toast.style.color = "#0a0f1a";
            }
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                if(toast && toast.remove) toast.remove();
            }, 4500);
        }
        
        // Update ikon tombol
        function updateIcon() {
            if (isPlaying) {
                musicIcon.className = "fas fa-volume-up";
            } else {
                musicIcon.className = "fas fa-music";
            }
        }
        
        // Fungsi utama untuk memutar lagu
        function playMusic() {
            if (isPlaying) return Promise.resolve();
            return audio.play().then(() => {
                isPlaying = true;
                autoplaySuccess = true;
                updateIcon();
                console.log("✅ semz.mp3 sedang diputar");
                return true;
            }).catch(err => {
                console.log("Gagal memutar:", err);
                isPlaying = false;
                updateIcon();
                throw err;
            });
        }
        
        // Fungsi pause lagu
        function pauseMusic() {
            if (!isPlaying) return;
            audio.pause();
            isPlaying = false;
            updateIcon();
            console.log("⏸️ Musik dijeda");
        }
        
        // Toggle play/pause saat tombol ditekan
        function toggleMusic() {
            if (isPlaying) {
                pauseMusic();
                showToast("⏸️ Musik dijeda", false);
            } else {
                playMusic().then(() => {
                    showToast("🎵 Memutar semz.mp3", false);
                }).catch(() => {
                    showToast("⚠️ Gagal memutar musik, coba klik lagi", true);
                });
            }
        }
        
        // Inisialisasi autoplay dengan fallback interaksi
        function initAutoplay() {
            // Coba autoplay secara otomatis
            audio.play().then(() => {
                isPlaying = true;
                autoplaySuccess = true;
                updateIcon();
                console.log("✅ Autoplay berhasil: semz.mp3 diputar");
                showToast("🎸 Selamat datang! semz.mp3 diputar otomatis");
            }).catch(err => {
                console.log("Autoplay diblokir browser:", err);
                // Browser memblokir autoplay, butuh interaksi pengguna dulu
                if (!interactionListenerActive) {
                    showToast("🎧 Klik ikon musik atau di mana saja untuk memutar semz.mp3", false);
                    // Event listener global untuk memulai musik saat interaksi pertama
                    const startMusicOnInteraction = function(e) {
                        // Hindari jika target adalah tombol toggle (nanti ditangani sendiri)
                        if (e.target.closest && e.target.closest('#musicToggleBtn')) return;
                        
                        if (!autoplaySuccess) {
                            audio.play().then(() => {
                                isPlaying = true;
                                autoplaySuccess = true;
                                updateIcon();
                                showToast("🎵 semz.mp3 mulai dimainkan", false);
                                console.log("Musik mulai setelah interaksi");
                            }).catch(e => {
                                console.log("Gagal juga setelah interaksi:", e);
                                showToast("⚠️ Gagal memutar musik. Coba klik ikon musik.", true);
                            });
                        }
                        // Hapus listener setelah berhasil/gagal agar tidak mengganggu
                        document.removeEventListener('click', startMusicOnInteraction);
                        document.removeEventListener('touchstart', startMusicOnInteraction);
                        interactionListenerActive = false;
                    };
                    document.addEventListener('click', startMusicOnInteraction);
                    document.addEventListener('touchstart', startMusicOnInteraction);
                    interactionListenerActive = true;
                }
            });
        }
        
        // Pastikan audio bisa dimuat dan error handling
        audio.addEventListener('error', (e) => {
            console.error("Error loading audio:", e);
            let errorMsg = "⚠️ Gagal memuat semz.mp3. Pastikan file tersedia di folder yang sama.";
            if (audio.error && audio.error.code === 4) {
                errorMsg = "⚠️ File semz.mp3 tidak ditemukan. Periksa kembali file musik.";
            }
            showToast(errorMsg, true);
        });
        
        // Tombol kontrol musik
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        // Jalankan autoplay saat halaman selesai dimuat
        window.addEventListener('load', () => {
            setTimeout(() => {
                initAutoplay();
            }, 100);
        });
        
        // COMING SOON alert untuk tombol 4 & 5
        const coming1 = document.getElementById('comingSoonBtn1');
        const coming2 = document.getElementById('comingSoonBtn2');
        
        function comingAlert() {
            alert("✨ Fitur COMING SOON! ✨\nTerima kasih sudah berkunjung ke SemzLink. Segera hadir dengan fitur keren!");
        }
        
        coming1.addEventListener('click', comingAlert);
        coming2.addEventListener('click', comingAlert);
        
        // Menampilkan pesan sambutan di console
        console.log("SemzLink siap | Auto-play semz.mp3 (dengan fallback interaksi)");
    })();
</script>
