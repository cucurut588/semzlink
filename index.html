        /* Efek kode berjalan */

        .btn-coming:hover {

        /* footer note */

        /* Music control button - floating subtle (opsional, user bisa pause) */
        .music-control {
            position: fixed;
            bottom: 20px;

            justify-content: center;

        .music-control:hover {

        /* Notifikasi kecil */
        .autoplay-toast {

            border-left: 4px solid #0a0f1a;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0);}
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; display: none;}
        }

        @media (max-width: 500px) {

<!-- Tombol kontrol musik floating (opsional, user bisa pause/play) -->
<div class="music-control" id="musicToggleBtn">
    <i class="fas fa-volume-up" id="musicIcon"></i>
</div>

<!-- Audio element: memutar file semz.mp3 -->
<audio id="bgMusic" loop preload="auto" style="display: none;"></audio>

<script>
    (function() {
        // === AUTOPLAY WAJIB LANGSUNG JALAN, GA PERLU DIKLIK ===
        // Menggunakan file semz.mp3 (pastikan file ini ada di folder yang sama)
        const musicUrl = "semz.mp3";
        const audio = document.getElementById('bgMusic');
        const toggleBtn = document.getElementById('musicToggleBtn');
        const musicIcon = document.getElementById('musicIcon');
        
        // Konfigurasi
        audio.src = musicUrl;
        audio.loop = true;
        audio.volume = 0.45; // volume nyaman
        
        let isPlaying = false;
        let autoplayAttempted = false;
        
        // Fungsi notifikasi
        function showToast(message, isError = false) {
            const oldToast = document.querySelector('.autoplay-toast');
            if(oldToast) oldToast.remove();
            
            let toast = document.createElement('div');
            toast.className = 'autoplay-toast';
            if(isError) {
                toast.style.background = "#ffae42dd";
                toast.style.color = "#1e2a1a";
            } else {
                toast.style.background = "#2ecc71dd";
                toast.style.color = "#0a0f1a";
            }
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                if(toast && toast.remove) toast.remove();
            }, 4500);
        }
        
        // Update icon tombol
        function updateIcon() {
            if (isPlaying) {
                musicIcon.className = "fas fa-volume-up";
            } else {
                musicIcon.className = "fas fa-volume-mute";
            }
        }
        
        // Fungsi play dengan force
        function forcePlayMusic() {
            if (isPlaying) return Promise.resolve(true);
            
            return audio.play().then(() => {
                isPlaying = true;
                updateIcon();
                console.log("✅ semz.mp3 AUTOPLAY BERHASIL");
                return true;
            }).catch(err => {
                console.log("Play gagal:", err);
                isPlaying = false;
                updateIcon();
                return false;
            });
        }
        
        // Fungsi pause
        function pauseMusic() {
            if (!isPlaying) return;
            audio.pause();
            isPlaying = false;
            updateIcon();
            console.log("⏸️ Musik dijeda");
        }
        
        // Toggle manual (jika user klik tombol)
        function toggleMusic() {
            if (isPlaying) {
                pauseMusic();
                showToast("⏸️ Musik dijeda", false);
            } else {
                forcePlayMusic().then((success) => {
                    if (success) {
                        showToast("🎵 Memutar semz.mp3", false);
                    } else {
                        showToast("⚠️ Gagal memutar musik", true);
                    }
                });
            }
        }
        
        // === STRATEGI AUTOPLAY LANGSUNG ===
        // 1. Coba play saat halaman load (setiap event yang memungkinkan)
        // 2. Gunakan teknik "User Gesture" palsu dengan simulasi klik ke body (legal untuk audio)
        // 3. Multiple attempt dengan interval kecil
        
        let autoplaySuccess = false;
        
        function attemptAutoplay() {
            if (autoplaySuccess) return;
            
            audio.play().then(() => {
                autoplaySuccess = true;
                isPlaying = true;
                updateIcon();
                console.log("🔥 AUTOPLAY SUKSES - MUSIK LANGSUNG JALAN!");
                showToast("🎸 Selamat datang! semz.mp3 diputar otomatis");
            }).catch(err => {
                console.log("Autoplay attempt failed:", err.name);
                // Jika gagal karena not allowed, coba lagi nanti
                if (err.name === "NotAllowedError") {
                    // Buat event listener sekali sentuh/klik untuk mulai musik
                    // TAPI bedanya, kita akan coba trigger otomatis dengan simulasi event
                    // Ini tetap butuh sentuhan user TAPI setidaknya user hanya perlu sentuh layar
                    // Tapi permintaan "gausah dipencet langsung muncul" - sayangnya browser WAJIB ada interaksi
                    // Solusi: kita paksa user sentuh pertama kali, TAPI kita tampilkan pesan sekali
                    if (!window._autoplayListenerAttached) {
                        window._autoplayListenerAttached = true;
                        const startOnAnyInteraction = function() {
                            audio.play().then(() => {
                                autoplaySuccess = true;
                                isPlaying = true;
                                updateIcon();
                                showToast("🎵 Musik mulai diputar! (sentuhan pertama)");
                                console.log("Musik mulai setelah interaksi pertama");
                            }).catch(e => console.log("Still failed:", e));
                            // Hapus listener setelah berhasil
                            document.removeEventListener('click', startOnAnyInteraction);
                            document.removeEventListener('touchstart', startOnAnyInteraction);
                            document.removeEventListener('keydown', startOnAnyInteraction);
                        };
                        document.addEventListener('click', startOnAnyInteraction);
                        document.addEventListener('touchstart', startOnAnyInteraction);
                        document.addEventListener('keydown', startOnAnyInteraction);
                        showToast("🎧 Sentuh layar untuk memulai musik (sekali saja)", false);
                    }
                }
            });
        }
        
        // Coba autoplay saat halaman fully loaded + interval berkala (beberapa kali percobaan)
        window.addEventListener('load', () => {
            // Delay 10ms pertama
            setTimeout(attemptAutoplay, 10);
            // Coba lagi di 200ms
            setTimeout(attemptAutoplay, 200);
            // Coba di 500ms
            setTimeout(attemptAutoplay, 500);
            // Coba di 1 detik
            setTimeout(attemptAutoplay, 1000);
        });
        
        // Juga coba saat DOMContentLoaded lebih awal
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(attemptAutoplay, 5);
        });
        
        // Untuk memaksimalkan autoplay, kita juga coba menggunakan iframe trick? tidak perlu
        // Tapi yang penting: browser Chrome, Firefox, Edge modern MEMBUTUHKAN user gesture.
        // Namun dengan percobaan ini, beberapa browser yang longgar akan langsung play.
        // Untuk browser strict, user hanya perlu sentuh layar SEKALI (bukan klik tombol khusus)
        
        // === FITUR TAMBAHAN: Resume play saat halaman terlihat lagi ===
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && autoplaySuccess && !isPlaying && audio.paused) {
                // Jika halaman kembali aktif dan musik harusnya muter tapi kepause (karena suatu hal)
                audio.play().catch(e => console.log("Resume gagal:", e));
            }
        });
        
        // Tombol toggle musik
        toggleBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleMusic();
        });
        
        // Error handling jika file tidak ditemukan
        audio.addEventListener('error', (e) => {
            console.error("Audio error:", e);
            let errorMsg = "⚠️ File semz.mp3 tidak ditemukan! Pastikan file ada di folder yang sama.";
            if (audio.error && audio.error.code === 4) {
                errorMsg = "⚠️ File semz.mp3 tidak ditemukan. Periksa kembali file musik.";
            }
            showToast(errorMsg, true);
        });
        
        // COMING SOUNT alert untuk tombol 4 & 5
        const coming1 = document.getElementById('comingSoonBtn1');
        const coming2 = document.getElementById('comingSoonBtn2');
        
        function comingAlert() {
            alert("✨ Fitur COMING SOON! ✨\nTerima kasih sudah berkunjung ke SemzLink. Segera hadir dengan fitur keren!");
        }
        
        coming1.addEventListener('click', comingAlert);
        coming2.addEventListener('click', comingAlert);
        
        console.log("SemzLink siap | Auto-play semz.mp3 - LANGSUNG JALAN TANPA KLIK (kecuali strict browser butuh sentuhan pertama)");
    })();
</script>
